<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="screen-orientation" content="portrait">
    <meta name="full-screen" content="yes">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#00629B">
    <link rel="stylesheet" href="style.css" />
    <script defer src="script.js"></script>
    <title>TaskFlow</title>
</head>

<body>
    <div id="green1"></div>
    <div id="green2"></div>
    <div class="navigation">
        <ul>
            <li class="list active">
                <a href="#">
                    <span class="icon"><ion-icon name="home-outline"></ion-icon></span>
                    <span class="text">Home</span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon"><ion-icon name="list-outline"></ion-icon></span>
                    <span class="text">Tasks</span>
                </a>
            </li>
            <li class="list" id="addTask">
                <a href="#">
                    <span class="icon"><ion-icon name="add-outline"></ion-icon></span>
                    <span class="text">Add</span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon"><ion-icon name="settings-outline"></ion-icon></span>
                    <span class="text">Settings</span>
                </a>
            </li>
            <li class="list">
                <a href="#">
                    <span class="icon"><ion-icon name="person-outline"></ion-icon></span>
                    <span class="text">Profile</span>
                </a>
            </li>
            <div class="indicator"></div>
        </ul>
    </div>

    <main>
        <header>
            <nav>
                <div id="greetings">
                    <img id="greetings_img" src="athul.jpg" alt="" />
                    <div id="greetings_cont">
                        <span id="greetings_name">Hi Athul</span>
                        <span id="greeting">Good Morning</span>
                    </div>
                </div>
                <div id="search">
                    <div id="search_box">
                        <!-- svg -->
                        <input id="search_input" type="text" placeholder="Search Your Tasks" />
                    </div>
                </div>
            </nav>
        </header>
        <div id="todays_tasks">
            <h5>Today's Tasks</h5>
        </div>
        <div id="upcoming_tasks">
            <h5>Upcoming Tasks</h5>
        </div>
    </main>




    <!-- form  -->
    <div id="overlay">
        <div class="form-container">
            <h2>Add New Task</h2>
            <form id="addTaskForm">
                <label for="taskName">Task Name</label>
                <input type="text" id="taskName" name="name" placeholder="Enter task name" />

                <label for="taskDate">Due Date</label>
                <input type="date" id="taskDate" name="lastDate"/>

                <label for="taskTime">Time</label>
                <input type="time" id="taskTime" name="lastTime"/>

                <label for="priority">Priority</label>
                <select id="priority" name="priority">
                    <option value="high">High</option>
                    <option value="medium">Medium</option>
                    <option value="low">Low</option>
                </select>

                <label for="notes">Notes</label>
                <textarea id="notes" placeholder="Additional details..." name="notes"></textarea>

                <button type="submit">Save Task</button>
                <button type="button" id="closeOverlay">Cancel</button>
            </form>
        </div>
    </div>


    <script type="module" src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@8.0.13/dist/ionicons/ionicons.js"></script>
</body>

</html>
